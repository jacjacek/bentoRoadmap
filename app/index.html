<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento Roadmap</title>
  <meta name="description" content="Local-first bento grid roadmap for product managers.">
  <link rel="icon" type="image/svg+xml" href="bentoroadmap-dark.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/svg+xml" href="bentoroadmap-light.svg" media="(prefers-color-scheme: dark)">
  <meta property="og:title" content="Bento Roadmap">
  <meta property="og:description" content="Local-first bento grid roadmap for product managers.">
  <meta property="og:image" content="https://bentoroadmap.com/og-image.svg">
  <meta property="og:url" content="https://app.bentoroadmap.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bento Roadmap">
  <meta name="twitter:description" content="Local-first bento grid roadmap for product managers.">
  <meta name="twitter:image" content="https://bentoroadmap.com/og-image.svg">
<style>
    :root {
      --bg: #f8f8f7;
      --card: #ffffff;
      --border: #e8e8e6;
      --border-faint: #f0f0ee;
      --focus-bg: #f7f7f6;
      --text: #1a1a19;
      --muted: #6b6b6b;
      --faint: #999894;
      --subtle: #cccbc8;
      --accent: #4a8ef5;
      --radius: 12px;
      --row-h: 148px;
      --gap: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 40px 28px 72px;
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.025em;
      outline: none;
      border-radius: 4px;
      transition: background 0.15s;
    }

    h1:focus {
      padding: 2px 5px;
      margin: -2px -5px;
      background: var(--focus-bg);
    }

    .actions {
      display: flex;
      gap: 24px;
    }

    .actions a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
      user-select: none;
    }

    .actions a:hover { color: var(--text); }

    .info-link { display: inline-flex; align-items: center; gap: 4px; }
    .info-link svg { opacity: 0.7; flex-shrink: 0; }

    /* ─── Period ─── */
    .period { margin-bottom: 4px; }

    .period-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 14px;
      padding-left: 2px;
    }

    .period-name {
      font-size: 14px;
      font-weight: 600;
      outline: none;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .period-name:focus {
      padding: 1px 4px;
      margin: -1px -4px;
      background: var(--focus-bg);
    }

    .period-date {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      outline: none;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .period-date:focus {
      padding: 1px 4px;
      margin: -1px -4px;
      background: var(--focus-bg);
    }

    .period-del {
      font-size: 14px;
      color: var(--faint);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      margin-left: 8px;
      user-select: none;
    }

    .period-head:hover .period-del { opacity: 1; }
    .period-del:hover { color: #d55; }

    .period-archive {
      font-size: 11px;
      color: var(--faint);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      margin-left: auto;
      user-select: none;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }

    .period-head:hover .period-archive { opacity: 1; }
    .period-archive:hover { color: var(--muted); }

    .period-archived-badge {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--faint);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── Grid ─── */
    .g {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-auto-rows: var(--row-h);
      gap: var(--gap);
    }

    /* ─── Card ─── */
    .c {
      background: var(--card);
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 18px 20px 14px;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: box-shadow 0.2s, border-color 0.2s, opacity 0.15s;
      overflow: hidden;
      cursor: grab;
    }

    .c:active { cursor: grabbing; }

    .c:hover {
      box-shadow: 0 3px 12px rgba(26,26,25,.05);
      border-color: var(--border-faint);
    }

    /* In-progress tiles keep their full border to stand out */
    .c.in-progress {
      border-color: var(--subtle);
    }

    .c.in-progress:hover {
      box-shadow: 0 3px 12px rgba(26,26,25,.07);
    }

    .st::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .in-progress .st::before { color: #4a8ef5; }
    .done .st::before        { color: #52b788; }
    .blocked .st::before     { color: #e07070; }
    .c:not(.in-progress):not(.done):not(.blocked) .st::before,
    .modal:not(.in-progress):not(.done):not(.blocked) .st::before { color: var(--faint); }

    /* ─── Drag states ─── */
    .c.dragging {
      opacity: 0.3;
      box-shadow: 0 12px 40px rgba(26,26,25,.15);
      border-color: var(--subtle);
    }

    .drop-before::before {
      content: '';
      position: absolute;
      left: -6px; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      z-index: 10;
    }

    .drop-after::after {
      content: '';
      position: absolute;
      right: -6px; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      z-index: 10;
    }

    .c, .gh { position: relative; }

    /* ─── Card text ─── */
    .t {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.015em;
      outline: none;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .de {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 5px;
      outline: none;
      border-radius: 4px;
      transition: background 0.15s;
      white-space: pre-wrap;
      /* 3-line clamp */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .de:empty::before {
      content: attr(data-placeholder);
      color: var(--faint);
      font-style: italic;
    }

    .c.editing .t {
      padding: 2px 5px;
      margin: -2px -5px;
      background: var(--focus-bg);
    }

    /* Remove clamp while editing description */
    .c.editing .de {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
      padding: 2px 5px;
      margin: 2px -5px;
      background: var(--focus-bg);
    }

    /* "more" tertiary button */
    .more-btn {
      display: none;
      align-self: flex-start;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
      letter-spacing: 0.01em;
    }

    .more-btn:hover { color: var(--text); }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,26,25,.32);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 24px;
      animation: mOverlayIn 0.15s ease;
    }

    .modal-overlay.closing {
      animation: mOverlayOut 0.13s ease forwards;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 28px 22px;
      max-width: 640px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      animation: mCardIn 0.18s cubic-bezier(0.34,1.4,0.64,1);
    }

    .modal-overlay.closing .modal {
      animation: mCardOut 0.13s ease forwards;
    }

    @keyframes mOverlayIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes mOverlayOut { to   { opacity: 0; } }
    @keyframes mCardIn     { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes mCardOut    { to   { transform: scale(0.96); opacity: 0; } }

    .modal-close {
      position: absolute;
      top: 16px; right: 18px;
      font-size: 18px;
      color: var(--faint);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .modal-close:hover { color: var(--muted); background: var(--bg); }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.025em;
      outline: none;
      border-radius: 4px;
      margin-bottom: 14px;
      display: block;
      padding: 3px 6px;
      margin-left: -6px;
      padding-right: 28px;
      line-height: 1.3;
    }

    .modal-title:focus {
      background: var(--focus-bg);
    }

    .modal-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      outline: none;
      border-radius: 4px;
      min-height: 60px;
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
      padding: 4px 6px;
      margin-left: -6px;
    }

    .modal-desc:focus {
      background: var(--focus-bg);
    }

    .modal-desc:empty::before {
      content: attr(data-placeholder);
      color: var(--border);
      font-style: italic;
    }

    .modal-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border-faint);
    }

    /* ─── Footer ─── */
    .f {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-top: 6px;
      position: relative;
    }

    .st {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .st:hover { color: var(--text); }

    .done .st { color: var(--muted); }
    .done .t  { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--subtle); }
    .blocked  { border-style: dashed; }

    .tg {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      margin-left: auto;
      outline: none;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .tg:focus {
      padding: 1px 3px;
      margin-right: -3px;
      background: var(--focus-bg);
    }

    .tg:empty::before {
      content: attr(data-placeholder);
      color: var(--border-faint);
      font-style: italic;
    }

    /* ─── Delete button ─── */
    .del-btn {
      position: absolute;
      top: 6px; right: 6px;
      width: 18px; height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--faint);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
      border-radius: 4px;
      z-index: 2;
      user-select: none;
    }

    .c:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #d55; background: rgba(213,85,85,.08); }

    /* ─── Resize handle ─── */
    .rh {
      position: absolute;
      right: 6px; bottom: 4px;
      opacity: 0;
      transition: opacity 0.15s;
      color: var(--faint);
      font-size: 8px;
      cursor: nwse-resize;
      user-select: none;
      z-index: 2;
      padding: 4px;
    }

    .c:hover .rh { opacity: 1; }
    .rh:hover { color: var(--muted); }

    /* ─── Ghost tile ─── */
    .gh {
      border: 1px dashed transparent;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .gh span {
      font-size: 16px;
      color: var(--muted);
      opacity: 0;
      font-weight: 300;
      transition: opacity 0.15s;
      user-select: none;
    }

    .gh:hover { border-color: var(--subtle); background: rgba(255,255,255,.5); }
    .gh:hover span { opacity: 0.6; }

    /* ─── Task group dots ─── */
    .task-dots {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 5px;
      pointer-events: none;
    }

    .task-dots.dots-above {
      position: static;
      transform: none;
      justify-content: center;
      margin-top: auto;
      padding-bottom: 4px;
    }

    .has-dots-above .f { margin-top: 0; }

    .task-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      border: 1.5px solid var(--subtle);
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      flex-shrink: 0;
    }
    .task-dot.current {
      background: var(--muted);
      border-color: var(--muted);
      cursor: default;
    }
    .task-dot:not(.current):hover {
      border-color: var(--muted);
      transform: scale(1.3);
    }

    /* ─── Link button ─── */
    .link-btn {
      position: absolute;
      top: 6px; right: 26px;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      color: var(--faint);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
      border-radius: 4px;
      z-index: 2;
      user-select: none;
    }
    .c:hover .link-btn { opacity: 1; }
    .link-btn.active   { opacity: 1; color: var(--accent); }
    .link-btn:hover    { color: var(--muted); background: rgba(100,100,100,.08); }

    /* ─── Link popup ─── */
    .link-popup {
      position: fixed;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(26,26,25,.12);
      width: 220px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 3000;
      padding: 6px 0;
    }
    .link-popup-head {
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--faint);
      padding: 4px 12px 6px;
    }
    .link-popup-period {
      font-size: 9px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--faint);
      padding: 6px 12px 3px;
    }
    .link-popup-item {
      padding: 5px 12px;
      font-size: 12px; color: var(--muted);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .link-popup-item:hover { background: var(--bg); color: var(--text); }
    .link-popup-item.remove {
      color: var(--faint);
      border-bottom: 1px solid var(--border-faint);
      margin-bottom: 2px;
    }
    .link-popup-item.remove:hover { color: #d55; background: rgba(213,85,85,.06); }

    /* ─── Tile navigate highlight ─── */
    @keyframes tileHighlight {
      0%   { box-shadow: 0 0 0 2px var(--accent), 0 0 16px rgba(90,156,246,.25); }
      70%  { box-shadow: 0 0 0 2px var(--accent); }
      100% { box-shadow: none; }
    }
    .c.tile-flash { animation: tileHighlight 1.2s ease forwards; }

    /* ─── Filter dropdown ─── */
    .filter-wrap { position: relative; display: inline-flex; align-items: baseline; }

    .filter-btn.active { color: var(--text); }

    .filter-dropdown {
      position: fixed;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(26,26,25,.12);
      padding: 14px 16px;
      width: 280px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .filter-section { display: flex; flex-direction: column; gap: 6px; }

    .filter-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--faint);
    }

    .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }

    .filter-chip {
      font-size: 11px;
      font-family: inherit;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border-faint);
      border-radius: 6px;
      padding: 2px 8px;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .filter-chip:hover { border-color: var(--border); color: var(--text); }

    .filter-chip.on { background: var(--text); color: var(--card); border-color: var(--text); }

    /* ─── Dark mode ─── */
    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) {
        --bg: #141413;
        --card: #1e1e1c;
        --border: #2e2e2c;
        --border-faint: #252523;
        --focus-bg: #262624;
        --text: #e8e8e4;
        --muted: #8a8a84;
        --faint: #848480;
        --subtle: #3a3a38;
        --accent: #5b9cf6;
      }

      html:not([data-theme="light"]) .c:hover { box-shadow: 0 3px 12px rgba(0,0,0,.25); }
      html:not([data-theme="light"]) .c.in-progress:hover { box-shadow: 0 3px 12px rgba(0,0,0,.3); }
      html:not([data-theme="light"]) .modal-overlay { background: rgba(0,0,0,.55); }
      html:not([data-theme="light"]) .filter-dropdown { box-shadow: 0 8px 24px rgba(0,0,0,.4); }
      html:not([data-theme="light"]) .link-popup { box-shadow: 0 8px 24px rgba(0,0,0,.4); }
      html:not([data-theme="light"]) .gh:hover { background: rgba(255,255,255,.03); }
      html:not([data-theme="light"]) .modal-close:hover { background: var(--bg); }
      html:not([data-theme="light"]) .del-btn:hover { background: rgba(213,85,85,.12); }
    }

    html[data-theme="dark"] {
      --bg: #141413;
      --card: #1e1e1c;
      --border: #2e2e2c;
      --border-faint: #252523;
      --focus-bg: #262624;
      --text: #e8e8e4;
      --muted: #8a8a84;
      --faint: #5a5a56;
      --subtle: #3a3a38;
      --accent: #5b9cf6;
    }

    html[data-theme="dark"] .c:hover { box-shadow: 0 3px 12px rgba(0,0,0,.25); }
    html[data-theme="dark"] .c.in-progress:hover { box-shadow: 0 3px 12px rgba(0,0,0,.3); }
    html[data-theme="dark"] .modal-overlay { background: rgba(0,0,0,.55); }
    html[data-theme="dark"] .filter-dropdown { box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    html[data-theme="dark"] .link-popup { box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    html[data-theme="dark"] .gh:hover { background: rgba(255,255,255,.03); }
    html[data-theme="dark"] .modal-close:hover { background: var(--bg); }
    html[data-theme="dark"] .del-btn:hover { background: rgba(213,85,85,.12); }

    /* ─── Add period ─── */
    .add-period-btn {
      display: block;
      margin-top: 20px;
      font-size: 12px;
      color: var(--faint);
      text-decoration: none;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }

    .add-period-btn:hover { color: var(--text); }

    /* ─── Theme toggle ─── */
    .theme-toggle {
      font-size: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      padding: 0;
      line-height: 1;
      transition: transform 0.2s;
      user-select: none;
    }

    .theme-toggle:hover { transform: rotate(15deg); }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      :root { --row-h: 100px; --gap: 8px; }
      .wrap { padding: 32px 20px 56px; }
      .header { margin-bottom: 40px; }
      h1 { font-size: 16px; }
      .c { padding: 12px 14px 10px; }
      .t { font-size: 12px; }
      .de { font-size: 11px; }
      .period { margin-bottom: 4px; }
    }
  </style>
</head>
<body>

<main class="wrap" id="app"></main>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'bento-roadmap-v2';
  const THEME_KEY   = 'bento-theme';
  const STATUSES = ['Backlog', 'In progress', 'Blocked', 'Done'];
  const STATUS_CLS = { 'Done': ' done', 'Blocked': ' blocked', 'In progress': ' in-progress' };
  const GAP = 12;

  // ─── Theme ─────────────────────────────────────────────────────────────────
  function applyTheme(theme) {
    if (theme) document.documentElement.setAttribute('data-theme', theme);
    else document.documentElement.removeAttribute('data-theme');
  }

  function effectiveTheme() {
    const stored = localStorage.getItem(THEME_KEY);
    if (stored) return stored;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function toggleTheme() {
    const next = effectiveTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
    // update icon without full re-render
    const btn = document.querySelector('.theme-toggle');
    if (btn) btn.textContent = next === 'dark' ? '☀' : '☾';
  }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    if (!d || typeof d.title !== 'string' || !Array.isArray(d.periods)) return false;
    return d.periods.every(s =>
      s.id && typeof s.name === 'string' && Array.isArray(s.tiles) &&
      s.tiles.every(t => t.id && typeof t.title === 'string')

  // ─── Grid layout algorithm ─────────────────────────────────────────────────
  function layoutGrid(tiles, cols) {
    const grid = [];
    const placements = [];

    function ensure(n) { while (grid.length < n) grid.push(new Array(cols).fill(false)); }

    function fits(r, c, w, h) {
      if (c + w > cols) return false;
      ensure(r + h);
      for (let rr = r; rr < r + h; rr++)
        for (let cc = c; cc < c + w; cc++)
          if (grid[rr][cc]) return false;
      return true;
    }

    function mark(r, c, w, h) {
      ensure(r + h);
      for (let rr = r; rr < r + h; rr++)
        for (let cc = c; cc < c + w; cc++)
          grid[rr][cc] = true;
    }

    for (const tile of tiles) {
      const w = clamp(tile.colSpan || 1, 1, cols);
      const h = clamp(tile.rowSpan || 1, 1, 6);
      outer: for (let r = 0; ; r++) {
        ensure(r + 1);
        for (let c = 0; c <= cols - w; c++) {
          if (fits(r, c, w, h)) {
            mark(r, c, w, h);
            placements.push({ tile, row: r + 1, col: c + 1, w, h });
            break outer;
          }
        }
      }
    }

    // Empty cells (including one extra row for + buttons)
    const ghosts = [];
    ensure(grid.length + 1);
    for (let r = 0; r < grid.length; r++)
      for (let c = 0; c < cols; c++)
        if (!grid[r][c]) ghosts.push({ row: r + 1, col: c + 1 });

    return { placements, ghosts };
  }

  // ─── Editable helper ───────────────────────────────────────────────────────
  function makeEditable(element, opts) {
    element.contentEditable = 'plaintext-only';
    element.spellcheck = false;
    element.addEventListener('focus', () => {
      if (opts.onFocus) opts.onFocus();
    });
    element.addEventListener('blur', () => {
      if (opts.onBlur) opts.onBlur(element.textContent.trim());
    });
    element.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (!opts.multiline || !e.shiftKey)) { e.preventDefault(); element.blur(); }
      if (e.key === 'Escape') element.blur();
    });
    element.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
    // prevent drag from starting when clicking into text
    element.addEventListener('mousedown', (e) => e.stopPropagation());
  }

  // ─── Description overflow check ────────────────────────────────────────────
  function checkDescriptionOverflow() {
    document.querySelectorAll('[data-tile]').forEach(cardEl => {
      const deEl = cardEl.querySelector('.de');
      const moreEl = cardEl.querySelector('.more-btn');
      if (!deEl || !moreEl) return;
      moreEl.style.display = deEl.scrollHeight > deEl.clientHeight + 2 ? 'block' : 'none';
    });

  // ─── Modal ─────────────────────────────────────────────────────────────────
  function openModal(tile) {
    const overlay = el('div', 'modal-overlay');
    overlay.setAttribute('role', 'dialog');
    overlay.setAttribute('aria-modal', 'true');
    overlay.setAttribute('aria-labelledby', 'modal-title-' + tile.id);

    const modal = el('div', 'modal' + (STATUS_CLS[tile.status] || ''));

    const closeBtn = el('button', 'modal-close');
    closeBtn.textContent = '×';
    closeBtn.setAttribute('aria-label', 'Close dialog');
    closeBtn.addEventListener('click', () => closeModal(overlay));

    const titleEl = el('div', 'modal-title');
    titleEl.id = 'modal-title-' + tile.id;
    titleEl.textContent = tile.title;
    makeEditable(titleEl, {
      onBlur: (t) => { tile.title = t || 'Untitled'; saveState(); animatedRender(100); }
    });

    const descEl = el('div', 'modal-desc');
    descEl.textContent = tile.description || '';
    descEl.dataset.placeholder = 'Add description…';
    descEl.setAttribute('role', 'textbox');
    descEl.setAttribute('aria-multiline', 'true');
    descEl.setAttribute('aria-label', 'Tile description');
    makeEditable(descEl, {
      multiline: true,
      onBlur: (t) => { tile.description = t; saveState(); animatedRender(100); }
    });

    const footer = el('div', 'modal-footer');

    const st = el('span', 'st');
    st.textContent = tile.status;
    st.setAttribute('role', 'button');
    st.setAttribute('tabindex', '0');
    st.setAttribute('aria-label', `Status: ${tile.status}. Click to change`);
    st.addEventListener('click', () => {
      cycleStatus(tile);
      st.textContent = tile.status;
      st.setAttribute('aria-label', `Status: ${tile.status}. Click to change`);
      modal.className = 'modal' + (STATUS_CLS[tile.status] || '');
      saveState(); animatedRender(100);
    });
    addKeyClick(st);

    const tg = el('span', 'tg');
    tg.textContent = tile.tag || '';
    tg.dataset.placeholder = 'tag';
    tg.setAttribute('aria-label', 'Tile tag');
    makeEditable(tg, { onBlur: (t) => { tile.tag = t; saveState(); } });

    footer.append(st, tg);
    modal.append(closeBtn, titleEl, descEl, footer);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(overlay); });

    const onKey = (e) => { if (e.key === 'Escape') { closeModal(overlay); document.removeEventListener('keydown', onKey); } };
    document.addEventListener('keydown', onKey);
    overlay._cleanupKey = onKey;

    // Focus description for immediate editing
    setTimeout(() => descEl.focus(), 50);
  }

  function closeModal(overlay) {
    overlay.classList.add('closing');
    document.removeEventListener('keydown', overlay._cleanupKey);
    setTimeout(() => overlay.remove(), 130);
  }

  // ─── Responsive columns ────────────────────────────────────────────────────
  function getCols() {
    return window.innerWidth <= 640 ? 2 : window.innerWidth <= 1024 ? 3 : 6;
  }
  let cols = getCols();

  // ─── Drag & drop state ─────────────────────────────────────────────────────
  let dragSrc = null; // { periodIdx, tileIdx }

  function clearDropStyles() {
    document.querySelectorAll('.drop-before, .drop-after, .dragging').forEach(e => {
      e.classList.remove('drop-before', 'drop-after', 'dragging');
    });
  }

  // ─── Size picker ───────────────────────────────────────────────────────────
  // ─── Drag resize ───────────────────────────────────────────────────────────
  function startResize(e, tile, cardEl) {
    e.preventDefault();
    e.stopPropagation();

    const gridEl = cardEl.parentElement;
    const startX = e.clientX;
    const startY = e.clientY;
    const startCols = tile.colSpan || 1;
    const startRows = tile.rowSpan || 1;

    // Read cell dimensions from the live grid
    const cellW = (gridEl.clientWidth - (cols - 1) * GAP) / cols;
    const cellH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--row-h')) || 128;

    document.body.style.cursor = 'nwse-resize';
    document.body.style.userSelect = 'none';

    function onMove(ev) {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      const newCols = clamp(startCols + Math.round(dx / (cellW + GAP)), 1, cols);
      const newRows = clamp(startRows + Math.round(dy / (cellH + GAP)), 1, 6);
      if (newCols !== tile.colSpan || newRows !== tile.rowSpan) {
        tile.colSpan = newCols;
        tile.rowSpan = newRows;
        animatedRender(100); // fast — keeps pace with drag snaps
      }
    }

    function onUp() {
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      saveState(); // state is already rendered, just persist
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }

  // ─── Filter state ─────────────────────────────────────────────────────────
  const activeFilters = { periods: new Set(), dates: new Set(), statuses: new Set(), tags: new Set() };
  let showArchived = false;

  function hasActiveFilters() {
    return Object.values(activeFilters).some(s => s.size > 0);
  }

  function tileMatchesFilters(tile, periodName, periodDate) {
    const { periods, dates, statuses, tags } = activeFilters;
    if (periods.size && !periods.has(periodName)) return false;
    if (dates.size && !dates.has(periodDate || '')) return false;
    if (statuses.size && !statuses.has(tile.status)) return false;
    if (tags.size && !tags.has(tile.tag || '')) return false;
    return true;
  }

  function pruneActiveFilters() {
    const valid = collectFilterValues();
    for (const key of Object.keys(activeFilters)) {
      for (const v of [...activeFilters[key]]) {
        if (!valid[key].has(v)) activeFilters[key].delete(v);
      }
    }
  }

  function collectFilterValues() {
    const result = { periods: new Set(), dates: new Set(), statuses: new Set(), tags: new Set() };
    for (const p of state.periods) {
      if (p.archived && !showArchived) continue;
      result.periods.add(p.name);
      if (p.date) result.dates.add(p.date);
      for (const t of p.tiles) {
        result.statuses.add(t.status);
        if (t.tag) result.tags.add(t.tag);
      }
    }
    return result;
  }

  function openFilterDropdown(btnEl) {
    const existing = document.querySelector('.filter-dropdown');
    if (existing) { existing.remove(); return; }

    const vals = collectFilterValues();
    const dropdown = el('div', 'filter-dropdown');

    const archChip = el('button', 'filter-chip' + (showArchived ? ' on' : ''));
    archChip.textContent = 'show archived periods';
    archChip.addEventListener('click', (e) => {
      e.stopPropagation();
      showArchived = !showArchived;
      if (!showArchived) pruneActiveFilters();
      dropdown.remove();
      render();
      const newFilterBtn = document.querySelector('.filter-btn');
      if (newFilterBtn) openFilterDropdown(newFilterBtn);
    });
    dropdown.appendChild(archChip);

    const sections = [
      { key: 'periods',  label: 'Period', values: vals.periods  },
      { key: 'dates',    label: 'Date',   values: vals.dates    },
      { key: 'statuses', label: 'Status', values: vals.statuses },
      { key: 'tags',     label: 'Tag',    values: vals.tags     },
    ];

    for (const { key, label, values } of sections) {
      if (!values.size) continue;
      const sec = el('div', 'filter-section');
      const lbl = el('div', 'filter-label'); lbl.textContent = label;
      const chips = el('div', 'filter-chips');
      for (const v of values) {
        const chip = el('button', 'filter-chip' + (activeFilters[key].has(v) ? ' on' : ''));
        chip.textContent = v;
        chip.addEventListener('click', (e) => {
          e.stopPropagation();
          if (activeFilters[key].has(v)) activeFilters[key].delete(v);
          else activeFilters[key].add(v);
          chip.classList.toggle('on', activeFilters[key].has(v));
          syncFilterBtn(btnEl);
          render();
        });
        chips.appendChild(chip);
      }
      sec.append(lbl, chips);
      dropdown.appendChild(sec);
    }

    document.body.appendChild(dropdown);

    // Position below the button
    const rect = btnEl.getBoundingClientRect();
    dropdown.style.top = (rect.bottom + 8) + 'px';
    dropdown.style.right = (window.innerWidth - rect.right) + 'px';

    function onOutside(e) {
      if (!dropdown.contains(e.target) && !e.target.closest('.filter-btn')) {
        dropdown.remove();
        document.removeEventListener('click', onOutside);
      }
    }
    setTimeout(() => document.addEventListener('click', onOutside), 0);
  }

  function syncFilterBtn(btnEl) {
    const total = Object.values(activeFilters).reduce((s, set) => s + set.size, 0);
    btnEl.textContent = total > 0 ? `filter (${total})` : 'filter';
    btnEl.classList.toggle('active', total > 0);
  }

  // ─── Task groups ───────────────────────────────────────────────────────────
  let taskGroupsCache = new Map();

  function buildTaskGroups() {
    const groups = new Map();
    state.periods.forEach((period, periodIdx) => {
      period.tiles.forEach(tile => {
        if (!tile.taskGroupId) return;
        if (!groups.has(tile.taskGroupId)) groups.set(tile.taskGroupId, []);
        groups.get(tile.taskGroupId).push({ tile, periodIdx });
      });
    });
    for (const members of groups.values()) {
      members.sort((a, b) => a.periodIdx - b.periodIdx);
    }
    return groups;
  }

  function renderDots(members, currentIdx) {
    const row = el('div', 'task-dots');
    members.forEach((m, i) => {
      const dot = el('span', 'task-dot' + (i === currentIdx ? ' current' : ''));
      dot.setAttribute('aria-label', `Part ${i + 1} of ${members.length}`);
      if (i !== currentIdx) {
        dot.setAttribute('role', 'button');
        dot.setAttribute('tabindex', '0');
        dot.title = m.tile.title || 'Untitled';
        dot.addEventListener('click', (e) => {
          e.stopPropagation();
          const target = document.querySelector(`[data-tile="${m.tile.id}"]`);
          if (!target) return;
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(() => {
            target.classList.remove('tile-flash');
            void target.offsetWidth;
            target.classList.add('tile-flash');
            setTimeout(() => target.classList.remove('tile-flash'), 1200);
          }, 300);
        });
        addKeyClick(dot);
      }
      row.appendChild(dot);
    });
    return row;
  }

  function linkTiles(tileA, tileB) {
    if (tileA.taskGroupId && tileB.taskGroupId && tileA.taskGroupId !== tileB.taskGroupId) {
      const old = tileB.taskGroupId;
      state.periods.forEach(p => p.tiles.forEach(t => { if (t.taskGroupId === old) t.taskGroupId = tileA.taskGroupId; }));
    } else {
      const gid = tileA.taskGroupId || tileB.taskGroupId || uid();
      tileA.taskGroupId = gid;
      tileB.taskGroupId = gid;
    }
  }

  function unlinkTile(tile) {
    delete tile.taskGroupId;
    const counts = new Map();
    state.periods.forEach(p => p.tiles.forEach(t => {
      if (t.taskGroupId) counts.set(t.taskGroupId, (counts.get(t.taskGroupId) || 0) + 1);
    }));
    state.periods.forEach(p => p.tiles.forEach(t => {
      if (t.taskGroupId && counts.get(t.taskGroupId) === 1) delete t.taskGroupId;
    }));
  }

  function openLinkPopup(tile, anchorEl) {
    const existing = document.querySelector('.link-popup');
    if (existing) { existing.remove(); return; }

    const popup = el('div', 'link-popup');

    const head = el('div', 'link-popup-head');
    head.textContent = tile.taskGroupId ? 'Task group' : 'Link to tile';
    popup.appendChild(head);

    if (tile.taskGroupId) {
      const removeItem = el('div', 'link-popup-item remove');
      removeItem.textContent = '× Remove from group';
      removeItem.addEventListener('click', () => { unlinkTile(tile); saveState(); render(); popup.remove(); });
      popup.appendChild(removeItem);

      (taskGroupsCache.get(tile.taskGroupId) || []).forEach(m => {
        if (m.tile.id === tile.id) return;
        const item = el('div', 'link-popup-item');
        const period = state.periods[m.periodIdx];
        item.textContent = (period ? period.name + ' — ' : '') + (m.tile.title || 'Untitled');
        popup.appendChild(item);
      });
    } else {
      const hasOthers = state.periods.some(p => p.tiles.some(t => t.id !== tile.id));
      if (!hasOthers) {
        const empty = el('div', 'link-popup-item');
        empty.textContent = 'No other tiles';
        empty.style.color = 'var(--faint)';
        popup.appendChild(empty);
      }
      state.periods.forEach(period => {
        const others = period.tiles.filter(t => t.id !== tile.id);
        if (!others.length) return;
        const pLabel = el('div', 'link-popup-period');
        pLabel.textContent = period.name;
        popup.appendChild(pLabel);
        others.forEach(other => {
          const item = el('div', 'link-popup-item');
          item.textContent = other.title || 'Untitled';
          item.addEventListener('click', () => { linkTiles(tile, other); saveState(); render(); popup.remove(); });
          popup.appendChild(item);
        });
      });
    }

    document.body.appendChild(popup);

    const rect = anchorEl.getBoundingClientRect();
    const spaceBelow = window.innerHeight - rect.bottom - 8;
    const spaceAbove = rect.top - 8;
    if (spaceBelow >= 120 || spaceBelow >= spaceAbove) {
      popup.style.top = (rect.bottom + 6) + 'px';
    } else {
      popup.style.top = (rect.top - 6) + 'px';
      popup.style.transform = 'translateY(-100%)';
    }
    popup.style.right = (window.innerWidth - rect.right - 18) + 'px';

    function onOutside(e) {
      if (!popup.contains(e.target) && !anchorEl.contains(e.target)) {
        popup.remove();
        document.removeEventListener('click', onOutside);
      }
    }
    setTimeout(() => document.addEventListener('click', onOutside), 0);
  }

  // ─── Animated render (FLIP) ───────────────────────────────────────────────
  function animatedRender(ms = 220) {
    // Cancel any running FLIP so snapshot is at true rendered position
    const prevTiles = document.querySelectorAll('[data-tile]');
    prevTiles.forEach(el => {
      if (el.style.transform || el.style.transition) {
        el.style.transition = 'none';
        el.style.transform = '';
      }
    });

    // Snapshot positions before render
    const snap = new Map();
    prevTiles.forEach(el => {
      snap.set(el.dataset.tile, el.getBoundingClientRect());
    });

    render();

    // FLIP: play each tile from its old position to its new one
    document.querySelectorAll('[data-tile]').forEach(el => {
      const id = el.dataset.tile;
      const prev = snap.get(id);
      if (!prev) {
        // New tile — scale + fade in
        el.style.opacity = '0';
        el.style.transform = 'scale(0.92)';
        el.style.transition = 'none';
        requestAnimationFrame(() => {
          el.style.transition = `opacity ${Math.round(ms * 0.6)}ms ease, transform ${Math.round(ms * 0.6)}ms cubic-bezier(0.34,1.56,0.64,1)`;
          el.style.opacity = '';
          el.style.transform = '';
          setTimeout(() => { el.style.transition = ''; }, ms);
        });
        return;
      }
      const curr = el.getBoundingClientRect();
      const dx = prev.left - curr.left;
      const dy = prev.top - curr.top;
      if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return;
      el.style.transition = 'none';
      el.style.transform = `translate(${dx}px, ${dy}px)`;
      void el.offsetHeight; // force reflow
      el.style.transition = `transform ${ms}ms cubic-bezier(0.25,0.46,0.45,0.94)`;
      el.style.transform = '';
      setTimeout(() => { el.style.transition = ''; el.style.transform = ''; }, ms + 20);
    });
  }

  // ─── Render ────────────────────────────────────────────────────────────────
  function render() {
    taskGroupsCache = buildTaskGroups();
    const app = document.getElementById('app');
    app.innerHTML = '';

    // Header
    const header = el('div', 'header');
    const h1 = el('h1');
    h1.textContent = state.title;
    h1.setAttribute('aria-label', 'Roadmap title');
    makeEditable(h1, { onBlur: (t) => { state.title = t || 'Untitled'; saveState(); } });

    const actions = el('div', 'actions');

    const filterWrap = el('div', 'filter-wrap');
    const filterA = el('a', 'filter-btn' + (hasActiveFilters() ? ' active' : ''));
    const total = Object.values(activeFilters).reduce((s, set) => s + set.size, 0);
    filterA.textContent = total > 0 ? `filter (${total})` : 'filter';
    filterA.setAttribute('role', 'button'); filterA.setAttribute('tabindex', '0');
    filterA.addEventListener('click', (e) => { e.stopPropagation(); openFilterDropdown(filterA); });
    addKeyClick(filterA);
    filterWrap.appendChild(filterA);

    const importA = el('a'); importA.textContent = 'import'; importA.setAttribute('role', 'button'); importA.setAttribute('tabindex', '0'); importA.addEventListener('click', importData); addKeyClick(importA);
    const exportA = el('a'); exportA.textContent = 'export'; exportA.setAttribute('role', 'button'); exportA.setAttribute('tabindex', '0'); exportA.addEventListener('click', exportData); addKeyClick(exportA);
    const themeBtn = el('button', 'theme-toggle');
    themeBtn.textContent = effectiveTheme() === 'dark' ? '☀' : '☾';
    themeBtn.setAttribute('aria-label', 'Toggle theme');
    themeBtn.addEventListener('click', toggleTheme);
    const infoA = el('a', 'info-link'); infoA.href = 'https://bentoroadmap.com'; infoA.target = '_blank'; infoA.setAttribute('aria-label', 'About Bento Roadmap');
    infoA.innerHTML = 'info<svg width="9" height="9" viewBox="0 0 9 9" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 7.5L7.5 1.5M7.5 1.5H3.5M7.5 1.5V5.5" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    actions.append(infoA, filterWrap, importA, exportA, themeBtn);
    header.append(h1, actions);
    app.appendChild(header);

    // Periods
    state.periods.forEach((period, si) => {
      const sec = renderPeriod(period, si);
      if (sec) app.appendChild(sec);
    });

    const addPeriodBtn = el('a', 'add-period-btn');
    addPeriodBtn.textContent = '+ period';
    addPeriodBtn.setAttribute('role', 'button');
    addPeriodBtn.setAttribute('tabindex', '0');
    addPeriodBtn.addEventListener('click', addPeriod);
    addKeyClick(addPeriodBtn);
    app.appendChild(addPeriodBtn);

    // Check description overflow after paint (double rAF = after browser has painted)
    requestAnimationFrame(checkDescriptionOverflow);
  }

  function renderPeriod(period, si) {
    if (period.archived && !showArchived) return null;

    const visibleTiles = hasActiveFilters()
      ? period.tiles.filter(t => tileMatchesFilters(t, period.name, period.date))
      : period.tiles;
    if (hasActiveFilters() && visibleTiles.length === 0) return null;

    const sec = el('section', 'period' + (period.archived ? ' archived' : ''));

    const head = el('div', 'period-head');

    const name = el('span', 'period-name');
    name.textContent = period.name;
    name.setAttribute('aria-label', 'Period name');
    makeEditable(name, { onBlur: (t) => { period.name = t || 'Month'; saveState(); } });

    const date = el('span', 'period-date');
    date.textContent = period.date || '';
    date.setAttribute('aria-label', 'Period date');
    makeEditable(date, { onBlur: (t) => { period.date = t; saveState(); } });

    const arch = el('button', 'period-archive');
    arch.textContent = period.archived ? 'unarchive' : 'archive';
    arch.setAttribute('aria-label', period.archived ? `Unarchive ${period.name}` : `Archive ${period.name}`);
    arch.addEventListener('click', () => {
      period.archived = !period.archived;
      pruneActiveFilters();
      saveState(); render();
    });

    const del = el('span', 'period-del');
    del.textContent = '×';
    del.title = 'Delete month';
    del.setAttribute('role', 'button');
    del.setAttribute('aria-label', `Delete ${period.name}`);
    del.setAttribute('tabindex', '0');
    del.addEventListener('click', () => {
      if (state.periods.length <= 1) return;
      state.periods.splice(si, 1);
      saveState(); render();
    });
    addKeyClick(del);

    const badge = period.archived ? el('span', 'period-archived-badge') : null;
    if (badge) badge.textContent = 'archived';
    head.append(name, date, ...(badge ? [badge] : []), arch, del);
    sec.appendChild(head);

    // Grid
    const g = el('div', 'g');
    g.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    const { placements, ghosts } = layoutGrid(visibleTiles, cols);

    for (const p of placements) {
      g.appendChild(renderCard(p.tile, period, si, p));
    }

    for (const gh of ghosts) {
      const ghostEl = el('div', 'gh');
      ghostEl.style.gridColumn = `${gh.col} / span 1`;
      ghostEl.style.gridRow = `${gh.row} / span 1`;
      ghostEl.dataset.si = si;
      ghostEl.dataset.ghost = '1';

      const plus = el('span'); plus.textContent = '+'; plus.setAttribute('aria-hidden', 'true');
      ghostEl.setAttribute('role', 'button');
      ghostEl.setAttribute('aria-label', 'Add tile');
      ghostEl.setAttribute('tabindex', '0');
      ghostEl.appendChild(plus);

      addKeyClick(ghostEl);
      ghostEl.addEventListener('click', () => {
        const t = { id: uid(), colSpan: 1, rowSpan: 1, title: 'New task', description: '', status: 'Backlog', tag: '' };
        period.tiles.push(t);
        saveState(); animatedRender(200);
        setTimeout(() => {
          const titleEl = document.querySelector(`[data-tile="${t.id}"] .t`);
          if (titleEl) { titleEl.focus(); selectAll(titleEl); }
        }, 30);
      });

      // Drop target
      ghostEl.addEventListener('dragover', (e) => {
        if (!dragSrc) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        clearDropStyles();
        ghostEl.classList.add('drop-before');
      });
      ghostEl.addEventListener('dragleave', (e) => {
        if (!ghostEl.contains(e.relatedTarget)) ghostEl.classList.remove('drop-before', 'drop-after');
      });
      ghostEl.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!dragSrc) return;
        const { si: srcSi, ti: srcTi } = dragSrc;
        const [tile] = state.periods[srcSi].tiles.splice(srcTi, 1);
        // append to target period
        state.periods[si].tiles.push(tile);
        dragSrc = null; clearDropStyles();
        saveState(); animatedRender(220);
      });

      g.appendChild(ghostEl);
    }

    sec.appendChild(g);
    return sec;
  }

  function renderCard(tile, period, si, p) {
    const members = tile.taskGroupId ? taskGroupsCache.get(tile.taskGroupId) : null;
    const currentIdx = members ? members.findIndex(m => m.tile.id === tile.id) : -1;

    const card = el('div', 'c' + (STATUS_CLS[tile.status] || ''));
    card.dataset.tile = tile.id;
    card.dataset.si = si;
    card.style.gridColumn = `${p.col} / span ${p.w}`;
    card.style.gridRow = `${p.row} / span ${p.h}`;
    card.draggable = true;
    card.setAttribute('aria-label', tile.title);

    // Drag events
    card.addEventListener('dragstart', (e) => {
      dragSrc = { si, ti: period.tiles.indexOf(tile) };
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', tile.id);
      // slight delay so the ghost renders before opacity drops
      setTimeout(() => card.classList.add('dragging'), 0);
    });

    card.addEventListener('dragend', () => {
      dragSrc = null; clearDropStyles();
    });

    card.addEventListener('dragover', (e) => {
      if (!dragSrc) return;
      if (dragSrc.si === si && dragSrc.ti === period.tiles.indexOf(tile)) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      clearDropStyles();
      const rect = card.getBoundingClientRect();
      const half = rect.left + rect.width / 2;
      card.classList.add(e.clientX < half ? 'drop-before' : 'drop-after');
    });

    card.addEventListener('dragleave', (e) => {
      if (!card.contains(e.relatedTarget)) card.classList.remove('drop-before', 'drop-after');
    });

    card.addEventListener('drop', (e) => {
      e.preventDefault();
      if (!dragSrc) return;
      const { si: srcSi, ti: srcTi } = dragSrc;
      const isBefore = card.classList.contains('drop-before');

      // Remove from source
      const [movedTile] = state.periods[srcSi].tiles.splice(srcTi, 1);

      // Find current index of drop target (after splice, same period)
      const targetTi = period.tiles.indexOf(tile);
      let insertAt = isBefore ? targetTi : targetTi + 1;
      insertAt = clamp(insertAt, 0, period.tiles.length);

      state.periods[si].tiles.splice(insertAt, 0, movedTile);
      dragSrc = null; clearDropStyles();
      saveState(); animatedRender(220);
    });

    // Delete
    const delB = el('span', 'del-btn'); delB.textContent = '×';
    delB.setAttribute('role', 'button');
    delB.setAttribute('aria-label', 'Delete tile');
    delB.setAttribute('tabindex', '0');
    delB.addEventListener('click', (e) => {
      e.stopPropagation();
      const i = period.tiles.indexOf(tile);
      if (i !== -1) { period.tiles.splice(i, 1); saveState(); render(); }
    });
    addKeyClick(delB);

    // Link button
    const linkBtn = el('span', 'link-btn' + (tile.taskGroupId ? ' active' : ''));
    linkBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 3H3a2 2 0 0 0 0 4h1M6 7h1a2 2 0 0 0 0-4H6M3.5 5h3"/></svg>';
    linkBtn.setAttribute('role', 'button');
    linkBtn.setAttribute('aria-label', tile.taskGroupId ? 'Manage task group' : 'Link to task group');
    linkBtn.setAttribute('tabindex', '0');
    linkBtn.addEventListener('click', (e) => { e.stopPropagation(); openLinkPopup(tile, linkBtn); });
    addKeyClick(linkBtn);

    // Title
    const t = el('span', 't'); t.textContent = tile.title;
    t.setAttribute('aria-label', 'Tile title');
    makeEditable(t, {
      onFocus: () => card.classList.add('editing'),
      onBlur: (text) => { card.classList.remove('editing'); tile.title = text || 'Untitled'; saveState(); }
    });

    // Description (3-line clamped; clamp is lifted while editing via CSS .editing .de)
    const de = el('span', 'de'); de.textContent = tile.description || '';
    de.dataset.placeholder = 'Add description…';
    de.setAttribute('role', 'textbox');
    de.setAttribute('aria-multiline', 'true');
    de.setAttribute('aria-label', 'Tile description');
    makeEditable(de, {
      multiline: true,
      onFocus: () => card.classList.add('editing'),
      onBlur: (text) => {
        card.classList.remove('editing');
        tile.description = text;
        saveState();
        requestAnimationFrame(checkDescriptionOverflow);
      }
    });

    // "more" button — shown when description overflows 3 lines
    const moreBtn = el('span', 'more-btn');
    moreBtn.textContent = 'more';
    moreBtn.addEventListener('click', (e) => { e.stopPropagation(); openModal(tile); });

    // Footer
    const f = el('div', 'f');

    const st = el('span', 'st'); st.textContent = tile.status;
    st.setAttribute('role', 'button');
    st.setAttribute('tabindex', '0');
    st.setAttribute('aria-label', `Status: ${tile.status}. Click to change`);
    st.addEventListener('click', (e) => {
      e.stopPropagation();
      cycleStatus(tile);
      st.setAttribute('aria-label', `Status: ${tile.status}. Click to change`);
      saveState(); animatedRender(100);
    });
    addKeyClick(st);
    f.appendChild(st);

    const tg = el('span', 'tg'); tg.textContent = tile.tag || ''; tg.dataset.placeholder = 'tag';
    makeEditable(tg, { onBlur: (text) => { tile.tag = text; saveState(); } });
    f.appendChild(tg);

    // Resize handle
    const rh = el('span', 'rh'); rh.textContent = '⤡';
    rh.setAttribute('role', 'button');
    rh.setAttribute('aria-label', 'Resize tile');
    rh.setAttribute('tabindex', '0');
    rh.addEventListener('mousedown', (e) => startResize(e, tile, card));

    const dotsEl = members?.length >= 2 ? renderDots(members, currentIdx) : null;
    if (dotsEl) {
      if (p.w > 1) f.appendChild(dotsEl);
      else { dotsEl.classList.add('dots-above'); card.classList.add('has-dots-above'); }
    }
    card.append(delB, linkBtn, t, de, moreBtn, ...(dotsEl && p.w === 1 ? [dotsEl] : []), f, rh);
    return card;
  }

  // ─── Import / Export ───────────────────────────────────────────────────────
  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a = el('a');
    a.href = URL.createObjectURL(blob);
    a.download = `roadmap-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  function importData() {
    const input = el('input'); input.type = 'file'; input.accept = '.json';
    input.addEventListener('change', () => {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const d = JSON.parse(reader.result);
          if (!valid(d)) throw new Error('Invalid roadmap format');
          state = d; saveState(); render();
        } catch (err) { alert('Import failed: ' + err.message); }
      };
      reader.readAsText(file);
    });
    input.click();
  }

  // ─── Add Period ────────────────────────────────────────────────────────────
  function addPeriod() {
    const n = state.periods.length + 1;
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const now = new Date();
    const monthName = months[(now.getMonth() + n - 1) % 12];
    state.periods.push({ id: uid(), name: monthName, date: String(now.getFullYear()), tiles: [] });
    saveState(); render();
    setTimeout(() => {
      const names = document.querySelectorAll('.period-name');
      const last = names[names.length - 1];
      if (last) { last.focus(); selectAll(last); }
    }, 30);
  }

  // ─── Helpers ───────────────────────────────────────────────────────────────
  function addKeyClick(element) {
    element.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); element.click(); }
    });
  }

  function selectAll(el) {
    const r = document.createRange();
    r.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges(); sel.addRange(r);
  }

  // ─── Responsive ────────────────────────────────────────────────────────────
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const nc = getCols();
      if (nc !== cols) { cols = nc; render(); }
    }, 200);
  });

  // ─── Init ──────────────────────────────────────────────────────────────────
  render();
})();
</script>
</body>
</html>
